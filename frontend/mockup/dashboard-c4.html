<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>N.O.V.A — C4 (Bento Grid)</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    :root { --bg: #F2F2F7; --surface: #FFFFFF; --surface2: rgba(118,118,128,0.10); --surface3: rgba(118,118,128,0.16); --primary: #007AFF; --green: #34C759; --orange: #FF9500; --red: #FF3B30; --label: #000000; --label2: #6C6C70; --label3: #AEAEB2; --sep: rgba(60,60,67,0.12); --shadow: 0 2px 10px rgba(0,0,0,0.07); --header-bg: rgba(242,242,247,0.88); }
    [data-theme="dark"] { --bg: #000000; --surface: #1C1C1E; --surface2: rgba(118,118,128,0.18); --surface3: rgba(118,118,128,0.26); --primary: #0A84FF; --green: #30D158; --orange: #FF9F0A; --red: #FF453A; --label: #FFFFFF; --label2: #EBEBF5; --label3: #6C6C70; --sep: rgba(84,84,88,0.65); --shadow: 0 2px 10px rgba(0,0,0,0.30); --header-bg: rgba(28,28,30,0.88); }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--label); font-family: "Pretendard Variable", -apple-system, sans-serif; font-size: 17px; letter-spacing: -0.022em; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    .variant-tag { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 100; background: #BF5AF2; color: white; padding: 6px 14px; border-radius: 100px; font-size: 11px; font-weight: 800; letter-spacing: 0.04em; }
    .app { height: 100dvh; display: flex; flex-direction: column; }
    .header { height: 52px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; background: var(--header-bg); backdrop-filter: blur(28px); border-bottom: 0.5px solid var(--sep); flex-shrink: 0; }
    .logo-wrap { display: flex; align-items: center; gap: 8px; }
    .logo { width: 36px; height: 36px; border-radius: 9px; background: linear-gradient(135deg, #007AFF, #5856D6); color: white; font-weight: 800; font-size: 13px; letter-spacing: 0.05em; display: flex; align-items: center; justify-content: center; }
    .brand-name { font-size: 16px; font-weight: 800; letter-spacing: 0.08em; }
    .brand-sub { font-size: 10px; color: var(--label2); font-weight: 500; }

    .grid { flex: 1; display: grid; grid-template-columns: 380px 1fr 1fr 1fr; gap: 1px; background: var(--sep); overflow: hidden; }
    .panel { background: var(--bg); display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .panel-head { padding: 13px 20px 12px; border-bottom: 0.5px solid var(--sep); display: flex; justify-content: space-between; align-items: center; }
    .panel-title { font-size: 17px; font-weight: 700; letter-spacing: -0.022em; }
    .panel-subtitle { font-size: 12px; color: var(--label2); font-weight: 500; }

    /* Bento grid 본문 */
    .bento {
      flex: 1; overflow-y: auto;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-auto-rows: min-content;
      gap: 8px;
      grid-template-areas:
        "pnl pnl"
        "ai ai"
        "movers movers"
        "kospi kosdaq"
        "alert quick";
    }
    .bento-card {
      background: var(--surface);
      border: 0.5px solid var(--sep);
      border-radius: 14px;
      padding: 12px 14px;
      overflow: hidden;
    }
    .bento .pnl { grid-area: pnl; }
    .bento .ai { grid-area: ai; background: linear-gradient(135deg, rgba(0,122,255,0.06), rgba(88,86,214,0.04)); border-color: rgba(0,122,255,0.20); }
    .bento .movers { grid-area: movers; }
    .bento .kospi { grid-area: kospi; }
    .bento .kosdaq { grid-area: kosdaq; }
    .bento .alert { grid-area: alert; background: rgba(255,149,0,0.06); border-color: rgba(255,149,0,0.25); }
    .bento .quick { grid-area: quick; padding: 8px; }

    .card-label { font-size: 10px; color: var(--label2); font-weight: 700; letter-spacing: -0.01em; margin-bottom: 8px; }

    /* PnL */
    .pnl-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; }
    .pnl-text { display: flex; flex-direction: column; gap: 2px; }
    .pnl-val { font-size: 24px; font-weight: 800; letter-spacing: -0.035em; color: var(--red); font-variant-numeric: tabular-nums; line-height: 1; }
    .pnl-amt { font-size: 11px; color: var(--label2); font-weight: 600; font-variant-numeric: tabular-nums; }
    .pnl-spark { width: 100px; height: 38px; flex-shrink: 0; }

    /* AI */
    .ai-headline { font-size: 14px; font-weight: 700; letter-spacing: -0.022em; line-height: 1.5; color: var(--label); margin: 0; }
    .ai-headline strong { color: var(--primary); }
    .ai-tag { font-size: 10px; font-weight: 800; color: var(--primary); letter-spacing: 0.04em; }

    /* Movers (compact) */
    .mover-row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid var(--sep); cursor: pointer; }
    .mover-row:last-child { border-bottom: none; }
    .mover-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .mover-spark { width: 30px; height: 16px; flex-shrink: 0; }
    .mover-name { font-size: 13px; font-weight: 700; letter-spacing: -0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mover-pct { font-size: 13px; font-weight: 800; letter-spacing: -0.025em; font-variant-numeric: tabular-nums; }

    /* 시장 단일 카드 (KOSPI / KOSDAQ 각 카드) */
    .market-single {
      display: flex; flex-direction: column; gap: 4px;
    }
    .market-single .top {
      display: flex; justify-content: space-between; align-items: center;
    }
    .market-single .nm { font-size: 11px; color: var(--label2); font-weight: 700; letter-spacing: -0.01em; }
    .market-single .vl { font-size: 18px; font-weight: 800; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
    .market-single .cg { font-size: 11px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .market-single svg { width: 100%; height: 24px; margin-top: 2px; }

    /* 알림 */
    .alert-content { display: flex; align-items: center; gap: 8px; }
    .alert-bell { width: 18px; height: 18px; color: var(--orange); }
    .alert-text { font-size: 13px; font-weight: 700; letter-spacing: -0.015em; }
    .alert-count { background: var(--red); color: white; font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 100px; font-variant-numeric: tabular-nums; margin-left: auto; }

    /* Quick 그리드 (2x2 내부) */
    .quick-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 4px; height: 100%; }
    .quick-cell { background: var(--surface2); border-radius: 8px; padding: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; transition: background 0.15s; }
    .quick-cell:hover { background: var(--surface3); }
    .quick-cell .icon { width: 16px; height: 16px; color: var(--primary); }
    .quick-cell .nm { font-size: 10px; font-weight: 700; color: var(--label); letter-spacing: -0.01em; }

    .placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--label3); font-size: 13px; }
    .theme-toggle { position: fixed; bottom: 20px; right: 20px; background: var(--surface); border: 0.5px solid var(--sep); border-radius: 100px; padding: 8px 14px; font-size: 12px; font-weight: 700; color: var(--label); box-shadow: var(--shadow); z-index: 50; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; overflow-y: auto; } .panel:not(.home) { display: none; } }
  </style>
</head>
<body data-theme="light">
  <div class="variant-tag">C4 — Bento Grid</div>
  <button class="theme-toggle" id="themeBtn">🌙 다크</button>
  <div class="app">
    <header class="header">
      <div class="logo-wrap"><div class="logo">N</div><div><div class="brand-name">N.O.V.A</div><div class="brand-sub">AI 기반 투자 인사이트 플랫폼</div></div></div>
    </header>
    <div class="grid">
      <div class="panel home">
        <div class="panel-head"><div class="panel-title">홈</div><div class="panel-subtitle">위젯으로 보는 오늘</div></div>
        <div class="bento">

          <div class="bento-card pnl">
            <div class="card-label">오늘 평가손익</div>
            <div class="pnl-row">
              <div class="pnl-text">
                <span class="pnl-val">+2.34%</span>
                <span class="pnl-amt">평가 8,234만원</span>
              </div>
              <svg class="pnl-spark" viewBox="0 0 100 38" preserveAspectRatio="none">
                <defs><linearGradient id="g4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,59,48,0.25)"/><stop offset="100%" stop-color="rgba(255,59,48,0)"/></linearGradient></defs>
                <polygon fill="url(#g4)" points="0,28 12,25 24,27 36,19 50,22 64,12 76,14 88,8 100,4 100,38 0,38"/>
                <polyline fill="none" stroke="var(--red)" stroke-width="1.6" points="0,28 12,25 24,27 36,19 50,22 64,12 76,14 88,8 100,4"/>
              </svg>
            </div>
          </div>

          <div class="bento-card ai">
            <div class="ai-tag" style="margin-bottom: 6px;">✨ AI</div>
            <p class="ai-headline">반도체 강세에 <strong>SK하이닉스 +5%</strong>, 외인 매도 전환에 주의.</p>
          </div>

          <div class="bento-card movers">
            <div class="card-label" style="display: flex; justify-content: space-between;">
              <span>오늘 움직임</span>
              <span style="color: var(--primary); font-weight: 700;">전체 →</span>
            </div>
            <div class="mover-row">
              <div class="mover-left">
                <svg class="mover-spark" viewBox="0 0 30 16"><polyline fill="none" stroke="var(--red)" stroke-width="1.4" points="0,12 5,10 10,11 15,7 20,7 25,3 30,2"/></svg>
                <span class="mover-name">SK하이닉스</span>
              </div>
              <span class="mover-pct" style="color: var(--red);">+5.21%</span>
            </div>
            <div class="mover-row">
              <div class="mover-left">
                <svg class="mover-spark" viewBox="0 0 30 16"><polyline fill="none" stroke="var(--primary)" stroke-width="1.4" points="0,3 5,5 10,4 15,8 20,10 25,12 30,13"/></svg>
                <span class="mover-name">NAVER</span>
              </div>
              <span class="mover-pct" style="color: var(--primary);">−3.42%</span>
            </div>
            <div class="mover-row">
              <div class="mover-left">
                <svg class="mover-spark" viewBox="0 0 30 16"><polyline fill="none" stroke="var(--red)" stroke-width="1.4" points="0,9 5,10 10,7 15,8 20,5 25,4 30,3"/></svg>
                <span class="mover-name">삼성전자</span>
              </div>
              <span class="mover-pct" style="color: var(--red);">+2.18%</span>
            </div>
          </div>

          <div class="bento-card kospi market-single">
            <div class="top">
              <span class="nm">KOSPI</span>
              <span class="cg" style="color: var(--red);">+0.83%</span>
            </div>
            <span class="vl">2,654</span>
            <svg viewBox="0 0 100 24" preserveAspectRatio="none">
              <polyline fill="none" stroke="var(--red)" stroke-width="1.6" points="0,18 14,16 28,19 42,13 56,12 70,8 84,6 100,4"/>
            </svg>
          </div>

          <div class="bento-card kosdaq market-single">
            <div class="top">
              <span class="nm">KOSDAQ</span>
              <span class="cg" style="color: var(--red);">+1.24%</span>
            </div>
            <span class="vl">879.2</span>
            <svg viewBox="0 0 100 24" preserveAspectRatio="none">
              <polyline fill="none" stroke="var(--red)" stroke-width="1.6" points="0,20 14,17 28,14 42,15 56,9 70,5 84,3 100,2"/>
            </svg>
          </div>

          <div class="bento-card alert">
            <div class="card-label" style="color: var(--orange);">새 알림</div>
            <div class="alert-content">
              <svg class="alert-bell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              <span class="alert-text">3건 확인하기</span>
              <span class="alert-count">3</span>
            </div>
          </div>

          <div class="bento-card quick">
            <div class="quick-grid">
              <button class="quick-cell"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/></svg><span class="nm">포트</span></button>
              <button class="quick-cell"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="nm">AI</span></button>
              <button class="quick-cell"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span class="nm">스크리너</span></button>
              <button class="quick-cell"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><span class="nm">관심</span></button>
            </div>
          </div>

        </div>
      </div>
      <div class="panel"><div class="panel-head"><div class="panel-title">내 지갑</div></div><div class="placeholder">기존 PortfolioCard</div></div>
      <div class="panel"><div class="panel-head"><div class="panel-title">AI 비서</div></div><div class="placeholder">기존 ChatCard</div></div>
      <div class="panel"><div class="panel-head"><div class="panel-title">스크리너</div></div><div class="placeholder">기존 ScreenerCard</div></div>
    </div>
  </div>
  <script>
    const btn = document.getElementById("themeBtn");
    btn.addEventListener("click", () => { const c = document.body.getAttribute("data-theme"); const n = c === "dark" ? "light" : "dark"; document.body.setAttribute("data-theme", n); btn.textContent = n === "dark" ? "☀️ 라이트" : "🌙 다크"; });
  </script>
</body>
</html>
